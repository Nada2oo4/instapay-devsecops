name: CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: ${{ secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Tag Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != '' }}
          tags: |
            instapay:latest
            ${{ secrets.DOCKER_USERNAME != '' && format('{0}/instapay:latest', secrets.DOCKER_USERNAME) || '' }}

  deploy:
    name: Deploy to Kubernetes
    needs: build_and_push
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy using kubectl
        run: |
          if [ -d k8s/ ]; then
            if command -v kubectl >/dev/null 2>&1; then
              echo "Applying Kubernetes manifests..."
              kubectl apply -f k8s/
            else
              echo "kubectl not found. Install it or use a specialized action for production."
            fi
          else
            echo "k8s/ directory not found. Skipping deployment."
          fi
