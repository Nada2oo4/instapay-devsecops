name: DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install bandit pip-audit pytest

    - name: SCA (Software Composition Analysis) - pip-audit
      run: pip-audit -r backend/requirements.txt

    - name: SAST (Static Application Security Testing) - Bandit
      run: bandit -r backend/

    - name: Run Unit Tests
      run: |
        export PYTHONPATH=$PYTHONPATH:$(pwd)/backend
        pytest backend/tests/test_basic.py

  docker-build:
    needs: security-scan
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Build Docker Image
      run: |
        docker build -t instapay-backend:latest ./backend

  dast-scan:
    needs: docker-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Start Services for DAST
        run: |
          docker compose up -d backend mongodb
          # Wait for the service to be healthy
          sleep 10

      - name: ZAP Scan (DAST)
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:5000/health'
          rules_file_name: '.zap/rules.tsv'
          fail_action: false # Keep it for demo even if it finds issues
