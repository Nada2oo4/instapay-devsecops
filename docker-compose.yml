services:
  backend:
    build: ./backend
    ports:
      - "5001:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/instapay
      - JWT_SECRET_KEY=dev-secret-key
    depends_on:
      - mongodb
    networks:
      - instapay-net

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    networks:
      - instapay-net

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - instapay-net

networks:
  instapay-net:
    driver: bridge
